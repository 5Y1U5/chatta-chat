<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="512" height="512">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#3B82F6"/>
      <stop offset="100%" style="stop-color:#8B5CF6"/>
    </linearGradient>
    <linearGradient id="sparkle" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#FDE68A"/>
      <stop offset="100%" style="stop-color:#FBBF24"/>
    </linearGradient>
  </defs>

  <!-- 背景の角丸正方形 -->
  <rect x="0" y="0" width="512" height="512" rx="112" ry="112" fill="url(#bg)"/>

  <!-- チャット吹き出し -->
  <path d="M 130 150
           C 130 120, 155 95, 185 95
           L 327 95
           C 357 95, 382 120, 382 150
           L 382 270
           C 382 300, 357 325, 327 325
           L 220 325
           L 170 375
           L 180 325
           L 185 325
           C 155 325, 130 300, 130 270
           Z"
        fill="white" fill-opacity="0.95"/>

  <!-- AIスパークル（大） -->
  <path d="M 290 185
           C 290 185, 300 210, 320 215
           C 300 220, 290 245, 290 245
           C 290 245, 280 220, 260 215
           C 280 210, 290 185, 290 185 Z"
        fill="url(#sparkle)"/>

  <!-- AIスパークル（小・右上） -->
  <path d="M 340 140
           C 340 140, 345 152, 355 155
           C 345 158, 340 170, 340 170
           C 340 170, 335 158, 325 155
           C 335 152, 340 140, 340 140 Z"
        fill="url(#sparkle)" fill-opacity="0.7"/>

  <!-- AIスパークル（小・左下） -->
  <path d="M 195 240
           C 195 240, 199 250, 207 252
           C 199 254, 195 264, 195 264
           C 195 264, 191 254, 183 252
           C 191 250, 195 240, 195 240 Z"
        fill="url(#sparkle)" fill-opacity="0.6"/>

  <!-- テキストライン（チャットの中身を示す） -->
  <rect x="175" y="165" width="70" height="8" rx="4" fill="#3B82F6" fill-opacity="0.3"/>
  <rect x="175" y="190" width="55" height="8" rx="4" fill="#3B82F6" fill-opacity="0.2"/>
  <rect x="175" y="215" width="65" height="8" rx="4" fill="#3B82F6" fill-opacity="0.15"/>

  <!-- 下部のサブテキスト "AI" -->
  <text x="256" y="440" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="48" font-weight="700" fill="white" fill-opacity="0.9" letter-spacing="6">ChattaChat</text>
</svg>
